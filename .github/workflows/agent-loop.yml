name: agent-loop

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-agent-task:
    if: github.event_name == 'issues' && contains(join(github.event.issue.labels.*.name, ','), 'agent-task')
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue structure
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";
            const required = [
              "### Goal",
              "### In Scope",
              "### Out of Scope",
              "### Acceptance Criteria",
              "### Risk Level",
              "### Benchmark Subset",
              "### Constraints"
            ];
            const missing = required.filter((section) => !body.includes(section));
            if (missing.length > 0) {
              core.setFailed(`Issue missing required sections: ${missing.join(", ")}`);
            }
