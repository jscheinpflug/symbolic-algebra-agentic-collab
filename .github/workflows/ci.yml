name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-format-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR template sections
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const required = [
              "## Type Changes",
              "## TDD Phase",
              "## Feature ID",
              "## Depends On PR",
              "## Feature Context",
              "## Module Docs Updated",
              "## Tests Added",
              "## Benchmark Impact",
              "## Known Risks",
              "## Source Provenance",
              "## Agent Protocol Tags"
            ];
            const missing = required.filter((section) => !body.includes(section));
            if (missing.length > 0) {
              core.setFailed(`PR description missing required sections: ${missing.join(", ")}`);
            }

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.14.2.0"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.6.7-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.6.7-

      - name: Install dependencies
        run: cabal update

      - name: Install formatter and linter
        run: |
          cabal install --installdir="$HOME/.local/bin" --overwrite-policy=always fourmolu hlint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all

      - name: Format check
        run: ./scripts/format-check.sh

      - name: Lint
        run: ./scripts/lint.sh

      - name: Resolve benchmark threshold
        id: benchmark-threshold
        shell: bash
        run: |
          set -euo pipefail

          threshold="10"
          base_sha=""
          head_sha=""

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [ -n "${base_sha}" ] && [ -n "${head_sha}" ]; then
            changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"
            benchmark_sensitive_paths='^(bench/|src/SymbolicAlgebraAgenticCollab/Workflow\.hs|scripts/bench/|scripts/policy/check-bench-regressions\.sh)'

            if ! printf '%s\n' "${changed_files}" | grep -Eq "${benchmark_sensitive_paths}"; then
              threshold="200"
              echo "No benchmark-sensitive paths changed; using relaxed benchmark threshold."
            fi
          fi

          echo "threshold=${threshold}" >> "${GITHUB_OUTPUT}"
          echo "BENCH_REGRESSION_THRESHOLD_PERCENT=${threshold}"

      - name: Policy checks
        env:
          BENCH_REGRESSION_THRESHOLD_PERCENT: ${{ steps.benchmark-threshold.outputs.threshold }}
        run: ./scripts/policy/check-all.sh
