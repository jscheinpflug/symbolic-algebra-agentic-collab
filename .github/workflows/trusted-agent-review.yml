name: trusted-agent-review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review with trusted local agents"
        required: true
        type: string
      timeout_seconds:
        description: "Per-agent review timeout in seconds"
        required: false
        default: "300"
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

jobs:
  trust-gate:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.guard.outputs.pr_number }}
      pr_head_sha: ${{ steps.guard.outputs.pr_head_sha }}
    steps:
      - name: Validate trusted PR source and author
        id: guard
        uses: actions/github-script@v7
        with:
          script: |
            const prNumberRaw = core.getInput("pr_number", { required: true });
            const prNumber = Number(prNumberRaw);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid pr_number input: ${prNumberRaw}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;
            const fromFork = pr.head.repo.full_name !== repoFullName;
            const trustedAssociations = ["OWNER", "MEMBER", "COLLABORATOR"];
            const trustedAuthor = trustedAssociations.includes(pr.author_association);

            if (fromFork || !trustedAuthor) {
              core.setFailed(
                `Blocked trusted-agent-review dispatch. fromFork=${fromFork}, author_association=${pr.author_association}, pr=${prNumber}.`
              );
              return;
            }

            core.setOutput("pr_number", String(prNumber));
            core.setOutput("pr_head_sha", pr.head.sha);

  detect-reviewers:
    needs: trust-gate
    runs-on:
      - self-hosted
      - Linux
    outputs:
      claude_available: ${{ steps.detect.outputs.claude_available }}
      gemini_available: ${{ steps.detect.outputs.gemini_available }}
      codex_available: ${{ steps.detect.outputs.codex_available }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ needs.trust-gate.outputs.pr_number }}/head
          fetch-depth: 0

      - name: Detect available local reviewer CLIs
        id: detect
        run: |
          set +e
          timeout_value="${{ inputs.timeout_seconds }}"

          detect_agent() {
            local agent="$1"
            if ./scripts/agent/check-cli-health.sh --agent "${agent}" --probe --timeout "${timeout_value}"; then
              echo "${agent}_available=true" >> "${GITHUB_OUTPUT}"
            else
              echo "${agent}_available=false" >> "${GITHUB_OUTPUT}"
            fi
          }

          detect_agent claude
          detect_agent gemini
          detect_agent codex

  review-claude:
    if: needs.detect-reviewers.outputs.claude_available == 'true'
    needs:
      - trust-gate
      - detect-reviewers
    runs-on:
      - self-hosted
      - Linux
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ needs.trust-gate.outputs.pr_number }}/head
          fetch-depth: 0

      - name: Preflight local Claude CLI
        run: ./scripts/agent/check-cli-health.sh --agent claude

      - name: Run Claude reviewer
        run: |
          python3 scripts/agent/run-review.py \
            --task-id "${{ needs.trust-gate.outputs.pr_number }}" \
            --agent claude \
            --pr-number "${{ needs.trust-gate.outputs.pr_number }}" \
            --head-sha "${{ needs.trust-gate.outputs.pr_head_sha }}" \
            --timeout-seconds "${{ inputs.timeout_seconds }}" \
            --output "artifacts/reviews/${{ needs.trust-gate.outputs.pr_number }}/claude.json"

      - name: Upload Claude artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-claude
          path: artifacts/reviews/${{ needs.trust-gate.outputs.pr_number }}/claude.json
          if-no-files-found: error

  review-gemini:
    if: needs.detect-reviewers.outputs.gemini_available == 'true'
    needs:
      - trust-gate
      - detect-reviewers
    runs-on:
      - self-hosted
      - Linux
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ needs.trust-gate.outputs.pr_number }}/head
          fetch-depth: 0

      - name: Preflight local Gemini CLI
        run: ./scripts/agent/check-cli-health.sh --agent gemini

      - name: Run Gemini reviewer
        run: |
          python3 scripts/agent/run-review.py \
            --task-id "${{ needs.trust-gate.outputs.pr_number }}" \
            --agent gemini \
            --pr-number "${{ needs.trust-gate.outputs.pr_number }}" \
            --head-sha "${{ needs.trust-gate.outputs.pr_head_sha }}" \
            --timeout-seconds "${{ inputs.timeout_seconds }}" \
            --output "artifacts/reviews/${{ needs.trust-gate.outputs.pr_number }}/gemini.json"

      - name: Upload Gemini artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-gemini
          path: artifacts/reviews/${{ needs.trust-gate.outputs.pr_number }}/gemini.json
          if-no-files-found: error

  review-codex:
    if: needs.detect-reviewers.outputs.codex_available == 'true'
    needs:
      - trust-gate
      - detect-reviewers
    runs-on:
      - self-hosted
      - Linux
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ needs.trust-gate.outputs.pr_number }}/head
          fetch-depth: 0

      - name: Preflight local Codex CLI
        run: ./scripts/agent/check-cli-health.sh --agent codex

      - name: Run Codex reviewer
        run: |
          python3 scripts/agent/run-review.py \
            --task-id "${{ needs.trust-gate.outputs.pr_number }}" \
            --agent codex \
            --pr-number "${{ needs.trust-gate.outputs.pr_number }}" \
            --head-sha "${{ needs.trust-gate.outputs.pr_head_sha }}" \
            --timeout-seconds "${{ inputs.timeout_seconds }}" \
            --output "artifacts/reviews/${{ needs.trust-gate.outputs.pr_number }}/codex.json"

      - name: Upload Codex artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-codex
          path: artifacts/reviews/${{ needs.trust-gate.outputs.pr_number }}/codex.json
          if-no-files-found: error

  aggregate-reviews:
    needs:
      - trust-gate
      - detect-reviewers
      - review-claude
      - review-gemini
      - review-codex
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download Claude artifact
        if: needs.detect-reviewers.outputs.claude_available == 'true'
        uses: actions/download-artifact@v4
        with:
          name: review-claude
          path: artifacts/download/claude

      - name: Download Gemini artifact
        if: needs.detect-reviewers.outputs.gemini_available == 'true'
        uses: actions/download-artifact@v4
        with:
          name: review-gemini
          path: artifacts/download/gemini

      - name: Download Codex artifact
        if: needs.detect-reviewers.outputs.codex_available == 'true'
        uses: actions/download-artifact@v4
        with:
          name: review-codex
          path: artifacts/download/codex

      - name: Aggregate reviewer artifacts
        run: |
          reviewers=()
          if [ "${{ needs.detect-reviewers.outputs.claude_available }}" = "true" ]; then
            reviewers+=(claude)
          fi
          if [ "${{ needs.detect-reviewers.outputs.gemini_available }}" = "true" ]; then
            reviewers+=(gemini)
          fi
          if [ "${{ needs.detect-reviewers.outputs.codex_available }}" = "true" ]; then
            reviewers+=(codex)
          fi

          if [ "${#reviewers[@]}" -lt 2 ]; then
            echo "Need at least 2 available reviewers. Detected: ${reviewers[*]}" >&2
            exit 1
          fi

          reviewer_args=()
          for reviewer in "${reviewers[@]}"; do
            reviewer_args+=(--required-reviewer "${reviewer}")
          done

          python3 scripts/agent/aggregate-reviews.py \
            --artifacts-dir artifacts/download \
            --required-approvals 2 \
            "${reviewer_args[@]}" \
            --output-json "artifacts/reviews/${{ needs.trust-gate.outputs.pr_number }}/summary.json" \
            --output-md "artifacts/reviews/${{ needs.trust-gate.outputs.pr_number }}/summary.md"

      - name: Upload review summary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: review-summary
          path: |
            artifacts/reviews/${{ needs.trust-gate.outputs.pr_number }}/summary.json
            artifacts/reviews/${{ needs.trust-gate.outputs.pr_number }}/summary.md
          if-no-files-found: error

      - name: Comment review summary on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const prNumber = Number(`${{ needs.trust-gate.outputs.pr_number }}`);
            const summaryPath = `artifacts/reviews/${prNumber}/summary.md`;
            const body = fs.readFileSync(summaryPath, "utf8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

  publish-status:
    if: always() && needs.trust-gate.result == 'success'
    needs:
      - trust-gate
      - detect-reviewers
      - review-claude
      - review-gemini
      - review-codex
      - aggregate-reviews
    runs-on: ubuntu-latest
    steps:
      - name: Publish trusted review status for branch protection
        uses: actions/github-script@v7
        with:
          script: |
            const aggregateResult = `${{ needs.aggregate-reviews.result }}`;
            const sha = `${{ needs.trust-gate.outputs.pr_head_sha }}`;

            const stateByResult = {
              success: "success",
              failure: "failure",
              cancelled: "error",
              skipped: "error"
            };
            const descriptionByResult = {
              success: "Trusted review aggregate passed.",
              failure: "Trusted review aggregate failed.",
              cancelled: "Trusted review aggregate was cancelled.",
              skipped: "Trusted review aggregate was skipped."
            };

            const state = stateByResult[aggregateResult] || "error";
            const description =
              descriptionByResult[aggregateResult] ||
              `Trusted review aggregate ended with result=${aggregateResult}.`;
            const targetUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: "trusted-agent-review/aggregate",
              description,
              target_url: targetUrl
            });
