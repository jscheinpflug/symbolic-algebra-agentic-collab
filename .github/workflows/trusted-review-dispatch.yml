name: trusted-review-dispatch

on:
  issue_comment:
    types:
      - created

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: read

jobs:
  dispatch:
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch trusted review from PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.issue.number;
            const commenter = context.payload.comment.user.login;
            const association = context.payload.comment.author_association;
            const body = (context.payload.comment.body || "").trim();
            const commandPrefix = "/trusted-review";
            const startsWithCommand = body.toLowerCase().startsWith(commandPrefix);
            const safeComment = async (commentBody) => {
              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: commentBody
                });
              } catch (error) {
                core.warning(`Failed to post PR comment: ${error}`);
              }
            };

            if (!startsWithCommand) {
              core.info("No /trusted-review command found.");
              return;
            }

            const rawArgs = body.slice(commandPrefix.length).trim();
            const tokens = rawArgs.length > 0 ? rawArgs.split(/\s+/) : [];

            let parsedTimeout = 300;
            let enableGemini = true;

            for (const tokenRaw of tokens) {
              const token = tokenRaw.toLowerCase();
              if (token === "no-gemini") {
                enableGemini = false;
                continue;
              }

              const timeoutMatch = token.match(/^timeout=(\d+)$/);
              if (timeoutMatch) {
                parsedTimeout = Number(timeoutMatch[1]);
                continue;
              }

              await safeComment(
                `@${commenter} invalid token \`${tokenRaw}\`. Use \`/trusted-review [timeout=<seconds>] [no-gemini]\`.`
              );
              core.setFailed(`Invalid trusted-review token: ${tokenRaw}`);
              return;
            }

            const trustedAssociations = ["OWNER", "MEMBER", "COLLABORATOR"];
            if (!trustedAssociations.includes(association)) {
              await safeComment(
                `@${commenter} trusted review dispatch is restricted to OWNER/MEMBER/COLLABORATOR.`
              );
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });

            if (pr.state !== "open") {
              await safeComment(
                `@${commenter} PR #${prNumber} is not open; trusted review was not dispatched.`
              );
              return;
            }

            const fromFork = pr.head.repo.full_name !== `${owner}/${repo}`;
            const trustedAuthor = trustedAssociations.includes(pr.author_association);
            if (fromFork || !trustedAuthor) {
              await safeComment(
                `@${commenter} trusted review dispatch blocked by trust policy (fromFork=${fromFork}, pr_author_association=${pr.author_association}).`
              );
              return;
            }

            const timeoutSeconds = String(Math.min(900, Math.max(30, parsedTimeout)));

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: "trusted-agent-review.yml",
              ref: "main",
              inputs: {
                pr_number: String(prNumber),
                timeout_seconds: timeoutSeconds,
                enable_gemini: String(enableGemini)
              }
            });

            await safeComment(
              `@${commenter} dispatched \`trusted-agent-review\` for PR #${prNumber} with timeout=${timeoutSeconds}s and requested_gemini=${enableGemini ? "on" : "off"} (repo policy still applies).`
            );
